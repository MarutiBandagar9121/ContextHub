info:
  name: Verify Otp Route
  type: http
  seq: 3

http:
  method: POST
  url: "{{auth_service_base_url}}/auth/verify_otp"
  body:
    type: json
    data: |-
      {
        "id":4,
        "otp":"735"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if(res.getStatus() === 200){
          const data = res.getBody()
          const token = data?.access_token;
          bru.setEnvVar("access_token", token);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
