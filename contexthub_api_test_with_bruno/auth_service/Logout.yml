info:
  name: Logout
  type: http
  seq: 5

http:
  method: POST
  url: "{{auth_service_base_url}}/auth/logout"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if(res.getStatus() === 200){
          bru.deleteEnvVar("access_token")
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
